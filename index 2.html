<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon City</title>
<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial,sans-serif;
touch-action:none;
}
canvas{display:block;}
#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:24px;
font-weight:bold;
z-index:10;
}
.controls{
position:fixed;
bottom:20px;
left:20px;
display:grid;
grid-template-columns:80px 80px 80px;
grid-template-rows:80px 80px;
gap:10px;
z-index:20;
}
.btn{
background:rgba(255,255,255,0.15);
border:2px solid rgba(255,255,255,0.3);
border-radius:20px;
color:white;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(5px);
}
.up{grid-column:2;grid-row:1;}
.left{grid-column:1;grid-row:2;}
.down{grid-column:2;grid-row:2;}
.right{grid-column:3;grid-row:2;}
</style>
</head>
<body>

<div id="ui">💰 Geld: <span id="money">0</span></div>

<div class="controls">
<div class="btn up" data-key="ArrowUp">▲</div>
<div class="btn left" data-key="ArrowLeft">◀</div>
<div class="btn down" data-key="ArrowDown">▼</div>
<div class="btn right" data-key="ArrowRight">▶</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const world={w:4000,h:4000};

const car={
x:2000,
y:2000,
angle:0,
speed:0,
maxSpeed:7,
acc:0.15,
friction:0.97
};

let money=0;
const moneyEl=document.getElementById("money");

const keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

document.querySelectorAll(".btn").forEach(btn=>{
btn.addEventListener("touchstart",e=>{
e.preventDefault();
keys[btn.dataset.key]=true;
});
btn.addEventListener("touchend",e=>{
e.preventDefault();
keys[btn.dataset.key]=false;
});
});

const coins=[];
for(let i=0;i<50;i++){
coins.push({
x:Math.random()*world.w,
y:Math.random()*world.h,
r:12
});
}

function update(){

if(keys.ArrowUp) car.speed+=car.acc;
if(keys.ArrowDown) car.speed-=car.acc;

car.speed=Math.max(-3,Math.min(car.maxSpeed,car.speed));

if(keys.ArrowLeft) car.angle-=0.05*car.speed/2;
if(keys.ArrowRight) car.angle+=0.05*car.speed/2;

car.x+=Math.cos(car.angle)*car.speed;
car.y+=Math.sin(car.angle)*car.speed;

car.speed*=car.friction;

car.x=Math.max(0,Math.min(world.w,car.x));
car.y=Math.max(0,Math.min(world.h,car.y));

for(let i=coins.length-1;i>=0;i--){
const c=coins[i];
const dx=car.x-c.x;
const dy=car.y-c.y;

if(Math.hypot(dx,dy)<30){
coins.splice(i,1);
money+=100;
moneyEl.textContent=money;
}
}
}

function draw(){

ctx.fillStyle="#1a1a1a";
ctx.fillRect(0,0,canvas.width,canvas.height);

const camX=car.x-canvas.width/2;
const camY=car.y-canvas.height/2;

ctx.save();
ctx.translate(-camX,-camY);

ctx.strokeStyle="#333";
ctx.lineWidth=80;

for(let x=0;x<world.w;x+=400){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,world.h);
ctx.stroke();
}

for(let y=0;y<world.h;y+=400){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(world.w,y);
ctx.stroke();
}

ctx.strokeStyle="#00ffff55";
ctx.lineWidth=2;

for(let x=0;x<world.w;x+=400){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,world.h);
ctx.stroke();
}

for(let y=0;y<world.h;y+=400){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(world.w,y);
ctx.stroke();
}

coins.forEach(c=>{
ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
});

ctx.save();
ctx.translate(car.x,car.y);
ctx.rotate(car.angle);

ctx.fillStyle="#00aaff";
ctx.fillRect(-25,-12,50,24);

ctx.fillStyle="#ffffff";
ctx.fillRect(5,-8,15,16);

ctx.restore();

ctx.restore();
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
